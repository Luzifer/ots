name: generate-translations

on:
  issue_comment:
    types: [created]

jobs:
  gate:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/regen-translations')

    outputs:
      authorized: ${{ steps.pr.outputs.authorized }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
      head_sha: ${{ steps.pr.outputs.head_sha }}

    permissions:
      contents: read
      pull-requests: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check commenter permission and PR metadata
        id: pr
        run: node .github/scripts/translate-gate.ts
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}

  generate-translations:
    if: needs.gate.outputs.authorized == 'true'
    needs: [gate]

    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:06e2043d1dbc866ed1700fe2f3404eeca61bd9c3a41cf5aab6ce9f2ae1cc88e1
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    permissions:
      contents: write
      packages: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ needs.gate.outputs.head_repo }}
          ref: ${{ needs.gate.outputs.head_ref }}

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/ots/ots

      - name: Verify checked-out PR head
        run: |
          set -euo pipefail

          if [[ $(git rev-parse HEAD) != "${EXPECTED_SHA}" ]]; then
            echo "Checked-out HEAD does not match approved PR head SHA" >&2
            exit 1
          fi
        env:
          EXPECTED_SHA: ${{ needs.gate.outputs.head_sha }}

      - name: Fetch translation utility
        run: |
          oras pull ${TRANSLATE_IMG}
          chmod +x translate
        env:
          TRANSLATE_IMG: ghcr.io/luzifer/ots/translate-util:latest@sha256:e51e1a80d9d56c0dd9e8e74290003f2f47e4e0e7f09cbc9c23485f3c09dc73c7

      - name: Re-Generate embedded translations file
        run: ./translate

      - uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          commit_message: 'CI: Update embedded translations'
          file_pattern: 'src/langs/langs.js'
