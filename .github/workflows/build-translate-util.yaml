name: build-translate-util

on:
  push:
    branches: ['master']
    paths: ['ci/translate/**']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-translate-util:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:2539b418c38b69856f9f0a34de0110b6fb23dc425cf1ddcb3f00add2ca5f916c
      env:
        CGO_ENABLED: 0
        GOPATH: /go
        SOURCE_DATE_EPOCH: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          show-progress: false

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/ots/ots

      - name: Build translate utility
        working-directory: ./ci/translate
        run: |
          go build \
            -buildvcs=false \
            -ldflags='-s -w -buildid=' \
            -o ../../translate \
            -trimpath \
            .

      - name: Log into registry
        run: oras login ghcr.io -u "${{ github.actor }}" --password-stdin <<<"${{ secrets.GITHUB_TOKEN }}"

      - name: Publish translate utility
        run: |
          oras push \
            ghcr.io/luzifer/ots/translate-util:latest \
            --artifact-type application/vnd.luzifer.ots.translate-util \
            translate:application/octet-stream
